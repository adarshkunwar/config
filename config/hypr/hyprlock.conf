general {
    grace = 3
    hide_cursor = true
}

background {
    monitor =
    path = ~/Pictures/wallpapers/void-amber-glitch (2).png
    blur_passes = 0
    brightness = 1.0
}

# GHOST CLOCK (offset glitch effect)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(240, 160, 32, 0.08)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 4, 248
    halign = center
    valign = center
}

# MAIN CLOCK
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(240, 160, 32, 0.95)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 250
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] echo "> $(date +'%A, %d %B %Y')"
    color = rgba(251, 169, 34, 0.6)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 185
    halign = center
    valign = center
}

# SYSTEM INFO
label {
    monitor =
    text = cmd[update:5000] echo "// $(hostname) :: $(uptime -p | sed 's/up //')"
    color = rgba(136, 136, 136, 0.5)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 155
    halign = center
    valign = center
}

# PASSWORD FIELD
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(240, 160, 32, 0.6)
    inner_color = rgba(5, 5, 5, 0.9)
    font_color = rgba(240, 160, 32, 0.9)
    check_color = rgba(240, 160, 32, 1.0)
    fail_color = rgba(255, 85, 85, 0.9)
    fail_text = <span foreground="##ff5555ff">// ACCESS DENIED</span>
    fade_on_empty = false
    placeholder_text = <span foreground="##f0a02066">// auth required_</span>
    position = 0, -60
    halign = center
    valign = center
}

# USERNAME
label {
    monitor =
    text = cmd[update:0] echo "[ $(whoami) ]"
    color = rgba(102, 102, 102, 0.7)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}
